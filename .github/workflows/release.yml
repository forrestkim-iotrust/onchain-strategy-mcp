name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref to build (for manual rc testing). Release job will be skipped unless triggered by a tag push.'
        required: false
        default: ''

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  # CI-only release profile tuning: faster link + parallel codegen.
  # Trade a small binary-size/runtime-perf delta for ~30–50% build time savings.
  CARGO_PROFILE_RELEASE_LTO: "false"
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Install Linux build deps (libsecret + mold)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev pkg-config mold

      - name: Use mold as linker (Linux)
        if: runner.os == 'Linux'
        run: echo "RUSTFLAGS=-C link-arg=-fuse-ld=mold" >> "$GITHUB_ENV"

      - name: Build executor-mcp
        run: cargo build --release --bin executor-mcp --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/executor-mcp

      - name: Package tarball
        run: tar -czf executor-mcp-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release executor-mcp

      - name: Compute sha256
        run: shasum -a 256 executor-mcp-${{ matrix.target }}.tar.gz > executor-mcp-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: executor-mcp-${{ matrix.target }}
          path: |
            executor-mcp-${{ matrix.target }}.tar.gz
            executor-mcp-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14

  release:
    name: release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find dist -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.tar.gz
            release-assets/*.sha256
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          fail_on_unmatched_files: true

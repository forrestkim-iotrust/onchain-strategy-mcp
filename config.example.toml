# Local v1 runtime example config.
# Copy to an untracked local config file before editing operator-specific paths.
# Keep this file free of raw private keys and production secrets.

[logging]
level = "info"   # trace | debug | info | warn | error

[state]
# Path to the SQLite database file. Use ":memory:" for ephemeral testing,
# or an absolute path for fixed-location local operation. Relative paths are
# resolved against the process current working directory.
path = "./state.db"

[evm]
# Local Anvil default RPC endpoint and per-call timeout.
rpc_url = "http://127.0.0.1:8545"
call_timeout_ms = 1000             # 50..=30_000

# Address used by simulation calls. Set this to the same public address as
# the local hot-wallet account when testing non-noop strategies.
# This is a public address, not a private key.
simulation_from = "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"

[policy]
# Policy is deny-by-default. Start from examples/policies/local-anvil.toml
# for local chain 31337 examples, then keep chain/contract/selector limits
# as narrow as possible for the strategy being run.
path = "./policy.toml"

[signer]
# Env-var reference only. Put the raw private key in the operator environment
# variable named here, never in committed config or strategy JavaScript.
private_key_env = "EXECUTOR_PRIVATE_KEY"
receipt_timeout_ms = 120000
